<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIDES PRO 2026 | Login</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
linear-gradient(rgba(0,70,120,.55),rgba(0,0,0,.55)),
url("https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1920&q=80");

background-size:cover;
background-position:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

}

.login-box{

width:420px;
padding:40px;
border-radius:25px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(18px);

box-shadow:0 8px 40px rgba(0,0,0,.3);

color:white;

animation:fade .8s ease;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(40px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.logo{

width:90px;
height:90px;
border-radius:50%;
background:white;
margin:auto;
display:flex;
justify-content:center;
align-items:center;
font-size:38px;
color:#0f766e;

}

h1{

text-align:center;
margin-top:20px;
font-size:30px;

}

h2{

text-align:center;
font-weight:400;
font-size:15px;
margin-bottom:30px;

}

.input-group{

margin-bottom:18px;
position:relative;

}

.input-group i{

position:absolute;
left:15px;
top:16px;
color:#0f766e;

}

input{

width:100%;
padding:14px 14px 14px 45px;

border:none;

border-radius:12px;

outline:none;

font-size:15px;

}

button{

width:100%;
padding:15px;

border:none;

border-radius:12px;

background:#16a34a;

color:white;

font-size:17px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#15803d;
transform:scale(1.02);

}

.footer{

margin-top:25px;

text-align:center;

font-size:13px;

}

.footer a{

color:white;

text-decoration:none;

}

.version{

margin-top:10px;

text-align:center;

font-size:12px;

opacity:.8;

}

    </style>

</head>

<body>

<div class="login-box">

<div class="logo">

<i class="fa-solid fa-building-columns"></i>

</div>

<h1>SIDES PRO</h1>

<h2>
Sistem Informasi Desa Terpadu
<br>
Desa Kotadukuh
</h2>

<form id="loginForm">

<div class="input-group">

<i class="fa fa-user"></i>

<input
type="text"
id="username"
placeholder="Username"
required>

</div>

<div class="input-group">

<i class="fa fa-lock"></i>

<input
type="password"
id="password"
placeholder="Password"
required>

</div>

<button type="submit">

<i class="fa fa-right-to-bracket"></i>

LOGIN

</button>

</form>

<div class="footer">

Kecamatan Munjul • Kabupaten Pandeglang • Provinsi Banten

</div>

<div class="version">

Version 1.0 Enterprise Edition © 2026

</div>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user==="kotadukuh" && pass==="kotadukuh123"){

alert("Login Berhasil");

window.location="dashboard.html";

}else{

alert("Username atau Password Salah");

}

});

</script>

</body>
</html>
